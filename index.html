<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Modern UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0D0D0D;
            --text-color: #F2F2F2;
            --grid-line: #F2F2F2;
            --player-x: #30AADC;
            --player-o: #FF8000;
            --card-bg: #1A1A1A;
            --hover-bg: #262626;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
        }

        h1 {
            font-weight: 700;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 2.2rem;
            color: var(--text-color);
        }

        .status-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-text {
            font-weight: 500;
            font-size: 1.1rem;
        }

        #current-turn {
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background-color: var(--grid-line);
            border: 1px solid var(--grid-line);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            position: relative;
        }

        .cell {
            aspect-ratio: 1/1;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .cell:hover {
            background-color: var(--hover-bg);
        }

        .cell.x { color: var(--player-x); }
        .cell.o { color: var(--player-o); }

        .cell.win {
            background-color: rgba(255, 255, 255, 0.08);
            text-shadow: 0 0 20px currentColor;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 13, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
            border-radius: 16px;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .overlay button {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        .overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255,255,255,0.2);
        }

        .controls {
            margin-top: 35px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button.outline {
            background: transparent;
            color: var(--text-color);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        button.outline:hover {
            border-color: var(--text-color);
            background: rgba(255,255,255,0.05);
        }

        .scores {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .score-val {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .x-val { color: var(--player-x); }
        .o-val { color: var(--player-o); }
    </style>
</head>
<body>
    <div class="container">
        <h1>TIC TAC TOE</h1>
        
        <div class="status-container">
            <div id="status" class="status-text">
                Player <span id="current-turn">X</span>'s Turn
            </div>
        </div>

        <div style="position: relative;">
            <div class="grid" id="grid">
                <!-- Cells -->
            </div>
            <div class="overlay" id="overlay">
                <h2 id="overlay-msg">X Wins!</h2>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>

        <div class="scores">
            <div class="score-item">
                <span>PLAYER X</span>
                <span class="score-val x-val" id="score-x">0</span>
            </div>
            <div class="score-item">
                <span>PLAYER O</span>
                <span class="score-val o-val" id="score-o">0</span>
            </div>
        </div>

        <div class="controls">
            <button class="outline" onclick="resetGame()">Reset Board (R)</button>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const turnDisplay = document.getElementById('current-turn');
        const statusText = document.getElementById('status');
        const scoreX = document.getElementById('score-x');
        const scoreO = document.getElementById('score-o');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');

        let isLocked = false;

        async function updateState() {
            try {
                const response = await fetch('/state');
                const state = await response.json();
                renderBoard(state);
                updateUI(state);
            } catch (e) { console.error("Update failed", e); }
        }

        function renderBoard(state) {
            gridElement.innerHTML = '';
            state.board.forEach((cell, index) => {
                const div = document.createElement('div');
                div.className = 'cell';
                if (cell) {
                    div.textContent = cell;
                    div.classList.add(cell.toLowerCase());
                }
                
                if (state.winningLine && state.winningLine.includes(index)) {
                    div.classList.add('win');
                }

                div.onclick = () => makeMove(index);
                gridElement.appendChild(div);
            });
        }

        function updateUI(state) {
            scoreX.textContent = state.scores.X;
            scoreO.textContent = state.scores.O;

            if (state.winner || state.draw) {
                overlay.classList.add('active');
                if (state.winner) {
                    overlayMsg.textContent = `${state.winner} Wins!`;
                    overlayMsg.style.color = state.winner === 'X' ? 'var(--player-x)' : 'var(--player-o)';
                    statusText.innerHTML = `Game Over: ${state.winner} won!`;
                } else {
                    overlayMsg.textContent = "It's a Draw!";
                    overlayMsg.style.color = 'var(--text-color)';
                    statusText.textContent = "Game Over: Draw!";
                }
            } else {
                overlay.classList.remove('active');
                turnDisplay.textContent = state.currentPlayer;
                turnDisplay.style.color = `var(--player-${state.currentPlayer.toLowerCase()})`;
                statusText.innerHTML = `Player <span style="color: var(--player-${state.currentPlayer.toLowerCase()})">${state.currentPlayer}</span>'s Turn`;
            }
        }

        async function makeMove(index) {
            if (isLocked) return;
            isLocked = true;
            await fetch(`/move?index=${index}`);
            await updateState();
            isLocked = false;
        }

        async function resetGame() {
            await fetch('/reset');
            await updateState();
        }

        // Initialize
        updateState();

        // Keyboard Shortcut (R or Escape)
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' || e.key === 'Escape') {
                resetGame();
            }
        });

        // Faster polling for snappier sync
        setInterval(updateState, 500);
    </script>
</body>
</html>
